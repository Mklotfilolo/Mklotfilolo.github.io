<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="keyword" content="car, supercar, supercar, luxury cars">
    <meta name="description" content="This website talks about supercars in the world">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="projictSupperCarSite.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Supercars World</title>
    <style>
        /* Additional responsive styles */
        .infoCar {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .infoCar > div {
            text-align: center;
            transition: transform 0.3s;
        }
        
        .infoCar > div:hover {
            transform: translateY(-5px);
        }
        
        .infoCar img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .titleCar {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }
        
        @media (max-width: 780px) {
            .infoCar {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 15px;
            }
            
            .titleLogo {
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .infoCar {
                grid-template-columns: 1fr;
            }
        }
        
        .btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #3a3a07;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #5a5a0a;
        }
    </style>
</head>
<body ondragstart="return true" onselect="return false">
    <header class='container-fluid py-3'>
        <div class="row align-items-center">
            <div class="col-6">
                <div class="titleLogo">Supercars</div>
            </div>
            <div class="col-6">
                <nav class='navBar'>
                    <ul class='navBarElement d-flex justify-content-end list-unstyled mb-0'>
                        <li class="ms-3"><a href="#" class="text-decoration-none">HOME</a></li>
                        <li class="ms-3"><a href="#" class="text-decoration-none">INFO</a></li>
                        <li class="ms-3"><a href="#" class="text-decoration-none">ABOUT</a></li>

            </div>
        </div>
    </header>
    
    <section class="infoCar container-fluid">

</body>
